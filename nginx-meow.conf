worker_processes 1;
daemon off;
error_log /tmp/nginx-meow-error.log;
pid /tmp/nginx-meow.pid;

events {
    worker_connections 1024;
}

http {
    access_log /tmp/nginx-meow-access.log;

    server {
        listen 80;
        server_name meow.host;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name meow.host;

        ssl_certificate /Applications/ServBay/ssl/private/tls-certs/meow.host/meow.host.crt;
        ssl_certificate_key /Applications/ServBay/ssl/private/tls-certs/meow.host/meow.host.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';

        # Admin static files from Vite dev server
        location /admin/ {
            proxy_pass http://127.0.0.1:3000/admin/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
        }

        # API proxy
        location /api/ {
            proxy_pass http://127.0.0.1:3003/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        # Root redirect to admin
        location = / {
            return 302 https://meow.host/admin/;
        }
    }
}
